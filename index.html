// localStorage 数据读写
const DB_KEY = 'offertrack_v1';
const SETTINGS_KEY = 'offertrack_settings';

function loadSettings() {
  const raw = localStorage.getItem(SETTINGS_KEY);
  const defaults = { nickname: '用户', email: 'user@example.com' };
  if (!raw) return defaults;
  try { return { ...defaults, ...JSON.parse(raw) }; } catch { return defaults; }
}
function saveSettings(patch) {
  const settings = { ...loadSettings(), ...patch };
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
  syncSidebar();
}
function syncSidebar() {
  const s = loadSettings();
  const avatarEl = document.getElementById('sidebar-avatar');
  const nameEl = document.getElementById('sidebar-name');
  const emailEl = document.getElementById('sidebar-email');
  if (avatarEl) avatarEl.textContent = (s.nickname || 'U')[0].toUpperCase();
  if (nameEl) nameEl.textContent = s.nickname || '未设置';
  if (emailEl) emailEl.textContent = s.email || '未设置';
}

function loadData() {
  const raw = localStorage.getItem(DB_KEY);
  if (!raw) {
    localStorage.setItem(DB_KEY, JSON.stringify(SEED_DATA));
    return [...SEED_DATA];
  }
  try {
    const data = JSON.parse(raw);
    // 修复被损坏的 priority 值（如 "🔥 Dream" → "Dream"）
    let dirty = false;
    data.forEach(app => {
      if (app.priority && !PRIORITIES.includes(app.priority)) {
        const found = PRIORITIES.find(p => app.priority.includes(p));
        if (found) { app.priority = found; dirty = true; }
        else { app.priority = 'Match'; dirty = true; }
      }
    });
    if (dirty) localStorage.setItem(DB_KEY, JSON.stringify(data));
    return data;
  } catch { return [...SEED_DATA]; }
}
function saveData(data) { localStorage.setItem(DB_KEY, JSON.stringify(data)); }
function updateApp(id, patch) {
  const data = loadData();
  const idx = data.findIndex(a => a.id === id);
  if (idx >= 0) {
    const app = data[idx];
    data[idx] = { ...app, ...patch };

    // 当阶段变为面试轮次时，自动添加面试记录
    const interviewStages = ['一面', '二面', '终面', 'HR面'];
    if (patch.stage && interviewStages.includes(patch.stage)) {
      if (!data[idx].interviews) data[idx].interviews = [];
      const exists = data[idx].interviews.some(iv => iv.round === patch.stage);
      if (!exists) {
        // 将上一轮标记为"通过"
        const prevRound = data[idx].interviews.length > 0
          ? data[idx].interviews[data[idx].interviews.length - 1]
          : null;
        if (prevRound && prevRound.result === '待定') {
          prevRound.result = '通过';
        }
        // 新增当前轮次
        data[idx].interviews.push({
          round: patch.stage,
          time: '',
          result: '待定',
          notes: ''
        });
      }
    }

    saveData(data);
  }
  render();
}
function deleteApp(id) {
  if (!confirm('确定删除这条申请记录吗？')) return;
  saveData(loadData().filter(a => a.id !== id));
  closeDrawer();
  render();
}
function addApp(app) {
  const data = loadData();
  data.unshift({ ...app, id: 'a' + Date.now() });
  saveData(data);
  render();
}

/* ==========================================================

   ========================================================== */
function daysUntil(dateStr) {
  if (!dateStr) return null;
  const targetStr = dateStr.length === 10 ? dateStr : dateStr.slice(0, 10).replace(/\//g, '-');
  const target = new Date(targetStr + 'T00:00:00');
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.round((target - today) / (1000 * 60 * 60 * 24));
}
function ddlColor(dateStr) {
  const d = daysUntil(dateStr);
  if (d === null) return 'text-zinc-400';
  if (d < 0) return 'text-zinc-400 line-through';
  if (d < 1) return 'text-red-600 font-semibold';
  if (d < 4) return 'text-amber-600 font-medium';
  return 'text-zinc-600';
}
function ddlText(dateStr) {
  if (!dateStr) return '—';
  const d = daysUntil(dateStr);
  const showStr = dateStr.slice(0, 16);
  if (d < 0) return showStr + ' · 已过期';
  if (d === 0) return showStr + ' · 今天';
  if (d === 1) return showStr + ' · 明天';
  if (d < 7) return showStr + ` · ${d}天后`;
  return showStr;
}
function daysSince(dateStr) {
  if (!dateStr) return null;
  const start = new Date(dateStr);
  const now = new Date();
  return Math.floor((now - start) / (1000 * 60 * 60 * 24));
}
function getEffectiveDDL(app) {
  if (app.interviews && app.interviews.length > 0) {
    const pendingIv = app.interviews.find(iv => iv.result === '待定' && iv.time);
    if (pendingIv) {
      return { date: pendingIv.time, source: 'interview', label: pendingIv.round };
    }
  }
  return { date: app.deadline || '', source: 'manual', label: app.nextAction || '' };
}

function matchesTab(app, tab) {
  const today = new Date().toISOString().slice(0, 10);
  switch(tab) {
    case 'all': return true;
    case 'todo': return STAGE_GROUPS.todo.includes(app.stage);
    case 'interview': return STAGE_GROUPS.interview.includes(app.stage);
    case 'waiting': return STAGE_GROUPS.waiting.includes(app.stage);
    case 'closed': return STAGE_GROUPS.closed.includes(app.stage);
    default: return true;
  }
}

          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>

        <button onclick="closeDrawer()" class="text-zinc-400 hover:text-zinc-700 p-1.5">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
    </div>

    <div class="p-6 space-y-6">
      <!-- 状态 & 优先级 -->
      <div class="flex gap-2">
        <span class="inline-flex items-center px-2.5 py-1 text-xs font-medium rounded ${PRIORITY_STYLE[app.priority].cls}">
          ${PRIORITY_STYLE[app.priority].emoji} ${app.priority}
        </span>
        <span class="inline-flex items-center px-2.5 py-1 text-xs font-medium rounded ${STAGE_STYLE[app.stage]||''}">
          ${app.stage}
        </span>
      </div>

      <!-- 快速操作 -->
      <div class="bg-brand-50 rounded-lg p-4">
        <div class="text-xs text-brand-700 mb-2 font-medium">快速推进状态</div>
        <div class="flex flex-wrap gap-2">
          ${getNextStages(app.stage).map(s => `
            <button onclick="updateApp('${app.id}', {stage: '${s}'}); openDrawer('${app.id}')" class="px-3 py-1.5 text-xs bg-white border border-brand-200 text-brand-700 rounded hover:bg-brand-100">
              → ${s}
            </button>
          `).join('')}
        </div>
      </div>

      <!-- 基础信息（可编辑） -->
      <div>
        <h3 class="text-sm font-semibold text-zinc-800 mb-3">基础信息 <span class="text-xs text-zinc-400 font-normal ml-1">点击可编辑</span></h3>
        <div class="bg-zinc-50 rounded-lg p-4 space-y-2.5 text-sm">
          <div class="flex items-center"><span class="w-20 text-zinc-500 flex-shrink-0">公司</span><input class="inline-edit flex-1" value="${app.company}" onchange="updateApp('${app.id}', {company: this.value}); openDrawer('${app.id}')"></div>
          <div class="flex items-center"><span class="w-20 text-zinc-500 flex-shrink-0">岗位</span><input class="inline-edit flex-1" value="${app.position}" onchange="updateApp('${app.id}', {position: this.value}); openDrawer('${app.id}')"></div>
          <div class="flex items-center"><span class="w-20 text-zinc-500 flex-shrink-0">投递日期</span><input type="date" class="inline-edit flex-1" value="${app.applyDate||''}" onchange="updateApp('${app.id}', {applyDate: this.value})"></div>
          <div class="flex items-center"><span class="w-20 text-zinc-500 flex-shrink-0">常规 DDL</span><div class="flex items-center flex-1 gap-2"><input type="datetime-local" class="inline-edit flex-1 ${isIvOverride ? 'opacity-50' : ''}" value="${app.deadline ? (app.deadline.length===10?app.deadline+'T23:59':app.deadline.replace(' ','T')) : ''}" onchange="updateApp('${app.id}', {deadline: this.value.replace('T', ' ')})">${isIvOverride ? '<span class="text-xs text-brand-600 font-medium whitespace-nowrap">以面试时间为准</span>' : ''}</div></div>
          <div class="flex items-center"><span class="w-20 text-zinc-500 flex-shrink-0">投递渠道</span>
            <select class="inline-edit flex-1" onchange="updateApp('${app.id}', {channel: this.value})">
              ${CHANNELS.map(c => `<option ${c===app.channel?'selected':''}>${c}</option>`).join('')}
            </select>
          </div>
          <div class="flex items-center"><span class="w-20 text-zinc-500 flex-shrink-0">工作地点</span><input class="inline-edit flex-1" value="${app.location||''}" placeholder="如：北京" onchange="updateApp('${app.id}', {location: this.value})"></div>
          <div class="flex items-center"><span class="w-20 text-zinc-500 flex-shrink-0">薪资</span><input class="inline-edit flex-1" value="${app.salary||''}" placeholder="如：25-40k" onchange="updateApp('${app.id}', {salary: this.value})"></div>
          <div class="flex items-center"><span class="w-20 text-zinc-500 flex-shrink-0">内推人</span><input class="inline-edit flex-1" value="${app.referrer||''}" placeholder="如：张同学" onchange="updateApp('${app.id}', {referrer: this.value})"></div>
          <div class="flex items-center"><span class="w-20 text-zinc-500 flex-shrink-0">JD 链接</span><input class="inline-edit flex-1" value="${app.jdUrl||''}" placeholder="https://..." onchange="updateApp('${app.id}', {jdUrl: this.value})"></div>
          <div class="flex items-center"><span class="w-20 text-zinc-500 flex-shrink-0">下一步</span><input class="inline-edit flex-1" value="${app.nextAction||''}" placeholder="如：完成在线笔试" onchange="updateApp('${app.id}', {nextAction: this.value})"></div>
        </div>
      </div>

      <!-- 标签 -->
      <div>
        <h3 class="text-sm font-semibold text-zinc-800 mb-3">标签</h3>
        <div class="flex flex-wrap gap-1.5">
          ${(app.tags||[]).map(t => `<span class="inline-block px-2 py-1 text-xs bg-zinc-100 text-zinc-700 rounded">${t}</span>`).join('') || '<span class="text-xs text-zinc-400">暂无</span>'}
        </div>
      </div>

      <!-- 面试轮次时间轴（可编辑） -->
      <div>
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-sm font-semibold text-zinc-800">面试轮次 <span class="text-xs text-zinc-400 font-normal ml-1">点击可编辑</span></h3>
          <button onclick="addInterview('${app.id}')" class="text-xs px-2.5 py-1 bg-brand-50 text-brand-600 rounded hover:bg-brand-100 flex items-center gap-1">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            添加轮次
          </button>
        </div>
        ${(app.interviews||[]).length === 0 ? '<div class="text-xs text-zinc-400 text-center py-4">暂无面试记录，点击上方按钮添加</div>' : `
        <div class="space-y-3">
          ${(app.interviews||[]).map((iv, i) => `
            <div class="flex group">
              <div class="flex flex-col items-center mr-3">
                <div class="w-3 h-3 rounded-full flex-shrink-0 ${iv.result==='通过'?'bg-green-500':iv.result==='待定'?'bg-blue-500':iv.result==='未通过'?'bg-red-400':'bg-zinc-300'}"></div>
                ${i < (app.interviews||[]).length-1 ? '<div class="flex-1 w-px bg-zinc-200 mt-1"></div>' : ''}
              </div>
              <div class="flex-1 pb-3">
                <div class="flex items-center gap-2 flex-wrap">
                  <input class="inline-edit text-sm font-medium text-zinc-800 w-16" value="${iv.round}" onchange="updateInterview('${app.id}', ${i}, 'round', this.value)" placeholder="轮次">
                  <select class="inline-edit text-xs font-medium rounded ${iv.result==='通过'?'bg-green-100 text-green-700':iv.result==='待定'?'bg-blue-100 text-blue-700':iv.result==='未通过'?'bg-red-100 text-red-600':'bg-zinc-100 text-zinc-500'}" onchange="updateInterview('${app.id}', ${i}, 'result', this.value)">
                    <option ${iv.result==='待定'?'selected':''}>待定</option>
                    <option ${iv.result==='通过'?'selected':''}>通过</option>
                    <option ${iv.result==='未通过'?'selected':''}>未通过</option>
                  </select>
                  <button onclick="deleteInterview('${app.id}', ${i})" class="opacity-0 group-hover:opacity-100 transition-opacity text-zinc-400 hover:text-red-500 p-0.5" title="删除此轮">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                  </button>
                </div>
                <input type="datetime-local" class="inline-edit text-xs text-zinc-500 mt-0.5 w-44" value="${(iv.time||'').replace(' ','T')}" onchange="updateInterview('${app.id}', ${i}, 'time', this.value.replace('T',' '))">
                <textarea class="inline-edit text-xs text-zinc-600 mt-1 w-full min-h-[32px] bg-zinc-50 rounded p-2 resize-none focus:bg-white focus:outline-none focus:ring-1 focus:ring-brand-500" placeholder="面试笔记..." onchange="updateInterview('${app.id}', ${i}, 'notes', this.value)">${iv.notes||''}</textarea>
              </div>
            </div>
          `).join('')}
        </div>`}
      </div>

      <!-- 笔记 -->
      <div>
        <h3 class="text-sm font-semibold text-zinc-800 mb-3">笔记</h3>
        <textarea onchange="updateApp('${app.id}', {notes: this.value})" class="w-full px-3 py-2 text-sm border border-zinc-200 rounded-md min-h-[100px] focus:outline-none focus:ring-2 focus:ring-brand-500" placeholder="记录面试感受、公司印象、需要注意的点...">${app.notes||''}</textarea>
      </div>
    </div>
  `;
}

function getNextStages(current) {
  const flow = {
    '待网申': ['已投递'],
    '已投递': ['待笔试', '一面', '已拒'],
    '待笔试': ['已笔试', '已拒'],
    '已笔试': ['一面', '已拒'],
    '一面': ['二面', '已拒'],
    '二面': ['终面', '已拒'],
    '终面': ['HR面', 'Offer', '已拒'],
    'HR面': ['Offer', '已拒'],
    '待回复Offer': ['已签约', '已放弃'],
    'Offer': ['已签约', '已放弃']
  };
  return flow[current] || ['已放弃'];
}

/* 面试轮次 CRUD */
function updateInterview(appId, index, field, value) {
  const data = loadData();
  const app = data.find(a => a.id === appId);
  if (!app || !app.interviews || !app.interviews[index]) return;
  app.interviews[index][field] = value;
  saveData(data);
  render();
  openDrawer(appId);
}
function deleteInterview(appId, index) {
  if (!confirm('确定删除这一轮面试记录吗？')) return;
  const data = loadData();
  const app = data.find(a => a.id === appId);
  if (!app || !app.interviews) return;
  app.interviews.splice(index, 1);
  saveData(data);
  render();
  openDrawer(appId);
}
function addInterview(appId) {
  const data = loadData();
  const app = data.find(a => a.id === appId);
  if (!app) return;
  if (!app.interviews) app.interviews = [];
  const rounds = ['一面','二面','三面','终面','HR面'];
  const nextRound = rounds[app.interviews.length] || `第${app.interviews.length+1}轮`;
  app.interviews.push({ round: nextRound, time: '', result: '待定', notes: '' });
  saveData(data);
  render();
  openDrawer(appId);
}

/* ==========================================================
   Modal 控制
   ========================================================== */
function openModal(id) {
  document.getElementById(id).classList.remove('hidden');
  if (id === 'modal-new') initNewForm();
}
function closeModal(id) {
  document.getElementById(id).classList.add('hidden');
}

function initNewForm() {
  const stageSelect = document.getElementById('f-stage');
  stageSelect.innerHTML = STAGES.map(s => `<option>${s}</option>`).join('');
  stageSelect.value = '已投递';

  // 初始化标签选择
  const tagContainer = document.getElementById('f-tags');
  let selectedTags = [];
  tagContainer.innerHTML = '';
  Object.entries(PRESET_TAGS).forEach(([dim, tags]) => {
    tags.forEach(t => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'px-2 py-1 text-xs border border-zinc-200 text-zinc-600 rounded hover:border-brand-300';
      btn.textContent = t;
      btn.onclick = () => {
        if (selectedTags.includes(t)) {
          selectedTags = selectedTags.filter(x => x !== t);
          btn.className = 'px-2 py-1 text-xs border border-zinc-200 text-zinc-600 rounded hover:border-brand-300';
        } else {
          selectedTags.push(t);
          btn.className = 'px-2 py-1 text-xs border border-brand-500 bg-brand-50 text-brand-700 rounded';
        }
        tagContainer.dataset.selected = JSON.stringify(selectedTags);
      };
      tagContainer.appendChild(btn);
    });
  });
  tagContainer.dataset.selected = '[]';

  // 清空其他字段
  ['f-company', 'f-position', 'f-next-action', 'f-deadline', 'jd-url'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('jd-result').classList.add('hidden');
}

function parseJD() {
  const url = document.getElementById('jd-url').value.trim();
  if (!url) { alert('请先粘贴 JD 链接'); return; }
  // Mock 解析：根据 URL 关键词猜测
  const mockResults = [
    { company: '字节跳动', position: '产品经理', tags: ['互联网', '产品', '北京'] },
    { company: '腾讯', position: '数据分析师', tags: ['互联网', '数据', '深圳'] },
    { company: '美团', position: '运营', tags: ['互联网', '运营', '北京'] }
  ];
  const pick = mockResults[Math.floor(Math.random() * mockResults.length)];
  document.getElementById('f-company').value = pick.company;
  document.getElementById('f-position').value = pick.position;
  // 自动勾选标签
  setTimeout(() => {
    const tagContainer = document.getElementById('f-tags');
    tagContainer.querySelectorAll('button').forEach(btn => {
      if (pick.tags.includes(btn.textContent)) btn.click();
    });
    document.getElementById('jd-result').classList.remove('hidden');
  }, 400);
}

function submitNew() {
  const company = document.getElementById('f-company').value.trim();
  const position = document.getElementById('f-position').value.trim();
  if (!company || !position) { alert('公司和岗位为必填项'); return; }

  const tagContainer = document.getElementById('f-tags');
  const tags = JSON.parse(tagContainer.dataset.selected || '[]');

  addApp({
    company, position,
    priority: document.getElementById('f-priority').value,
    stage: document.getElementById('f-stage').value,
    nextAction: document.getElementById('f-next-action').value,
    deadline: document.getElementById('f-deadline').value,
    applyDate: new Date().toISOString().slice(0, 10),
    channel: document.getElementById('f-channel').value,
    tags,
    jdUrl: document.getElementById('jd-url').value,
    notes: '', interviews: [],
    location: '', salary: '', referrer: ''
  });
  closeModal('modal-new');
}

/* ==========================================================
   主渲染
   ========================================================== */
function render() {
  const main = document.getElementById('main-content');
  let html = '';
  switch(currentRoute) {
    case 'dashboard': html = renderDashboard(); break;
    case 'applications': html = renderApplications(); break;
    case 'settings': html = renderSettings(); break;
  }
  main.innerHTML = html;
}

// 初始化
syncSidebar();
navigate('dashboard');
</script>
